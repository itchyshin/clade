# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# For help debugging build failures open an issue on the r-lib/actions repo.
on:
  push:
    branches: [main, master, scenario-audit-0.2.0]
    # Skip R-CMD-check on docs-only pushes — this repo is private and
    # has a 3 000 min/month Actions budget. Markdown-only, dev-notes,
    # and _pkgdown.yml changes cannot affect the package's check
    # status. Any commit that touches R/, inst/, man/, tests/,
    # DESCRIPTION, NAMESPACE, or vignettes/ still triggers the full
    # check.
    paths-ignore:
      - '**/*.md'
      - 'dev/**'
      - '_pkgdown.yml'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'dev/**'
      - '_pkgdown.yml'

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
                                  libfontconfig1-dev libharfbuzz-dev \
                                  libfribidi-dev libfreetype6-dev \
                                  libpng-dev libtiff5-dev libjpeg-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::devtools, any::testthat, any::jsonlite
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          # Skip vignettes + heavy tests — they require Julia, which we
          # don't install in CI. `--ignore-vignettes` suppresses the
          # "vignettes without output" warnings that --no-build-vignettes
          # otherwise triggers. `error-on: error` lets those warnings be
          # warnings (CI doesn't fail on a missing Julia-dependent
          # vignette render).
          args: 'c("--no-manual", "--as-cran", "--no-vignettes", "--no-tests", "--ignore-vignettes")'
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          error-on: '"error"'
