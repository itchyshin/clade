# Deploys pkgdown site to gh-pages. Requires repository setting
# "Pages -> Source: GitHub Actions".
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      # `clean: true` mirrors gh-pages to docs/ — files in gh-pages
      # that aren't in docs/ get removed. Was `clean: false` before
      # 2026-05-17, which let historical leaks linger forever
      # (AGENTS.html, CLAUDE.html, AFTER_TASK.html, 404.md, and the
      # stale reference/plot_dead_agents.md surfaced via
      # `git ls-tree origin/gh-pages` were all gh-pages-only files
      # that pkgdown doesn't currently produce). With `clean: true`,
      # the next deploy after this PR scrubs them.
      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: docs
