# Deploys pkgdown site to gh-pages. Requires repository setting
# "Pages -> Source: GitHub Actions".
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      # pkgdown 2.x auto-discovers root-level *.md files as
      # "extra articles" and renders them into docs/. For clade that
      # surfaces AGENTS.md, CLAUDE.md, AFTER_TASK.md, MEMORY.seed.md
      # — all dev-internal agent-instruction files that shouldn't
      # appear on the public site. (Verified: the build log shows
      # "Reading AGENTS.md → Writing AGENTS.html" on every build,
      # which is why the `clean: true` fix alone didn't scrub them.)
      # Strip both the .html and the copied .md before deploy.
      - name: Strip dev-internal pages from docs/ before deploy
        run: |
          set -x
          rm -fv docs/AGENTS.html docs/AGENTS.md \
                 docs/CLAUDE.html docs/CLAUDE.md \
                 docs/AFTER_TASK.html docs/AFTER_TASK.md \
                 docs/MEMORY.seed.html docs/MEMORY.seed.md \
                 docs/404.md
          # plot_dead_agents.md was an old-pkgdown artefact alongside
          # the legitimate plot_dead_agents.html; drop if present.
          rm -fv docs/reference/plot_dead_agents.md

      # `clean: true` mirrors gh-pages to docs/ — files in gh-pages
      # that aren't in docs/ get removed. Combined with the strip
      # step above, the deploy ends with a gh-pages that contains
      # only pkgdown's legitimate output minus the dev-internal pages.
      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: docs
