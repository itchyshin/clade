articles:
  - title: "Overview"
    navbar: ~
    contents:
      - why-clade
      - scenarios
      - getting-started
      - first-research-project
      - troubleshooting
      - parameter-reference
      - parameter-space-search

  - title: "Paper reproductions"
    desc: >
      Worked examples of taking a published behavioural-ecology
      paper, translating its quantitative prediction into a clade
      experiment, and reporting what reproduces versus what doesn't.
      Each vignette uses `hypothesis_sweep()` + `hypothesis_report()`
      plus one or more of clade's search / grid tools
      (`grid_specs()`, `batch_alife()`, `viability_report()`) to
      demonstrate a full research workflow. Start with the
      template if you're reproducing your own paper.
    navbar: ~
    contents:
      - paper-template
      - paper-kokko-brooks-2003
      - paper-griesser-2023
      - paper-dieckmann-doebeli-1999
      - paper-reale-2010
      - paper-emlen-1982
      - paper-courchamp-1999
      - paper-fuller-2005
      - paper-ryan-1990
      - paper-wolf2007
      - paper-wolf2008
      - paper-trivers1971

  - title: "Parameter search"
    desc: >
      Automated tools for finding parameter combinations that produce
      target evolutionary outcomes. Start with the introduction for
      when/why/which algorithm; then pick the agent-level or
      environment-level guide depending on what you're tuning; or go
      straight to the algorithm reference.
    navbar: ~
    contents:
      - ps-introduction
      - ps-agent-parameters
      - ps-environment-parameters
      - ps-algorithms

  - title: "Kernel as biology"
    desc: >
      Side-by-side reading of the simulation kernel — Julia code on the
      left, plain-English explanation and biological rationale on the
      right. Read these to understand the rules of the simulation as
      biology, spot inconsistencies, and find places where the model
      could be more realistic.
    navbar: ~
    contents:
      - k-README
      - k-tick
      - k-clade-main
      - k-sense
      - k-reproduce
      - k-death
      - k-genome

  - title: "Theme 1 — How do traits evolve?"
    navbar: ~
    contents:
