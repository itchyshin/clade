url: https://itchyshin.github.io/clade/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: "clade — evolve behaviour, minds, and brains in R"
  description: >
    A modular R + Julia testbed for the intraspecific, interspecific,
    and environmental interactions that shape behaviour, cognition, and
    social evolution. 32 of 32 biological scenarios audited against
    primary literature.

